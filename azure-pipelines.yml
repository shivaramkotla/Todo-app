trigger:
  branches:
    include:
      - main

variables:
  acrName: 'todoappacrshivaram'         # ⚠️ CHANGE TO YOUR ACR NAME
  acrConnection: 'ACR-Connection'
  backendImage: 'todo-backend'
  frontendImage: 'todo-frontend'
  imageTag: '$(Build.BuildId)'
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: 'CI - Build & Push Images'
  jobs:
  - job: BuildBackend
    displayName: 'Build Backend Image'
    pool:
      vmImage: $(vmImage)
    steps:
      - task: Docker@2
        displayName: 'Build & Push Backend to ACR'
        inputs:
          containerRegistry: $(acrConnection)
          repository: $(backendImage)
          command: 'buildAndPush'
          Dockerfile: 'backend/Dockerfile'
          buildContext: 'backend'
          tags: |
            $(imageTag)
            latest

  - job: BuildFrontend
    displayName: 'Build Frontend Image'
    pool:
      vmImage: $(vmImage)
    steps:
      - task: Docker@2
        displayName: 'Build & Push Frontend to ACR'
        inputs:
          containerRegistry: $(acrConnection)
          repository: $(frontendImage)
          command: 'buildAndPush'
          Dockerfile: 'frontend/Dockerfile'
          buildContext: 'frontend'
          tags: |
            $(imageTag)
            latest

  - job: PublishManifests
    displayName: 'Publish K8s Manifests as Artifacts'
    pool:
      vmImage: $(vmImage)
    steps:
      - task: PublishBuildArtifacts@1
        displayName: 'Publish manifests'
        inputs:
          PathtoPublish: 'k8s'
          ArtifactName: 'manifests'
          publishLocation: 'Container'
