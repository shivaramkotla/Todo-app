# CD Pipeline - Triggered by successful CI Pipeline
trigger: none  # Don't trigger on code commit
pr: none       # Don't trigger on pull requests

# Trigger ONLY when CI pipeline completes successfully
resources:
  pipelines:
    - pipeline: CI_Pipeline                              # Local alias (any name)
      source: 'shivaramkotla.Todo-app'                   # ✅ Your CI pipeline name
      trigger:
        branches:
          include:
            - main

variables:
  acrName: 'todoappacrshivaram'                          # ⚠️ Update if your ACR name is different
  aksConnection: 'AKS-Connection'                        # Your AKS service connection name
  imageTag: '$(resources.pipeline.CI_Pipeline.runID)'

stages:
- stage: Deploy
  displayName: 'CD - Deploy to AKS'
  jobs:
  - deployment: DeployToAKS
    displayName: 'Deploy to AKS Cluster'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'AKS-Production'
    strategy:
      runOnce:
        deploy:
          steps:
            # Step 1: Download manifests from CI pipeline
            - download: CI_Pipeline
              artifact: manifests
              displayName: 'Download manifests artifact'

            # Step 2: Update image placeholders with real values
            - script: |
                MANIFEST_DIR="$(Pipeline.Workspace)/CI_Pipeline/manifests"
                echo "===== Looking in: $MANIFEST_DIR ====="
                ls -la $MANIFEST_DIR
                
                # Replace placeholders in backend manifest
                sed -i "s|ACR_NAME_PLACEHOLDER|$(acrName)|g" $MANIFEST_DIR/backend-deployment.yaml
                sed -i "s|IMAGE_TAG_PLACEHOLDER|$(imageTag)|g" $MANIFEST_DIR/backend-deployment.yaml
                
                # Replace placeholders in frontend manifest
                sed -i "s|ACR_NAME_PLACEHOLDER|$(acrName)|g" $MANIFEST_DIR/frontend-deployment.yaml
                sed -i "s|IMAGE_TAG_PLACEHOLDER|$(imageTag)|g" $MANIFEST_DIR/frontend-deployment.yaml
                
                echo "===== Updated Backend Manifest ====="
                cat $MANIFEST_DIR/backend-deployment.yaml
                echo ""
                echo "===== Updated Frontend Manifest ====="
                cat $MANIFEST_DIR/frontend-deployment.yaml
              displayName: 'Update image placeholders'

            # Step 3: Deploy MongoDB (database first!)
            - task: KubernetesManifest@1
              displayName: 'Deploy MongoDB'
              inputs:
                action: 'deploy'
                kubernetesServiceConnection: $(aksConnection)
                namespace: 'default'
                manifests: '$(Pipeline.Workspace)/CI_Pipeline/manifests/mongo-deployment.yaml'

            # Step 4: Deploy Backend (depends on MongoDB)
            - task: KubernetesManifest@1
              displayName: 'Deploy Backend'
              inputs:
                action: 'deploy'
                kubernetesServiceConnection: $(aksConnection)
                namespace: 'default'
                manifests: '$(Pipeline.Workspace)/CI_Pipeline/manifests/backend-deployment.yaml'

            # Step 5: Deploy Frontend (depends on Backend)
            - task: KubernetesManifest@1
              displayName: 'Deploy Frontend'
              inputs:
                action: 'deploy'
                kubernetesServiceConnection: $(aksConnection)
                namespace: 'default'
                manifests: '$(Pipeline.Workspace)/CI_Pipeline/manifests/frontend-deployment.yaml'

            # Step 6: Show deployment summary
            - script: |
                echo "===== Deployment Complete! ====="
                echo "✅ MongoDB deployed"
                echo "✅ Backend deployed"
                echo "✅ Frontend deployed"
                echo ""
                echo "🌐 Get your app URL:"
                echo "   Azure Portal → Kubernetes services → todo-aks-cluster → Services and ingresses"
                echo "   Look for: frontend-service → External IP"
              displayName: 'Deployment Summary'
